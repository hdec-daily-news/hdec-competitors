name: Daily Competitor Update

on:
  schedule:
    # KST 오전 7:00 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect news & generate site
        run: python auto_competitors.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 대형사_동향.csv
          git diff --staged --quiet || git commit -m "Daily update $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push
