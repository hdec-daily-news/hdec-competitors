name: Daily Competitor Update

on:
  schedule:
    # KST 06:40 (UTC 21:40) — 정각은 GitHub 크론 혼잡으로 스킵되므로 off-peak 사용
    - cron: '40 21 * * *'
    # KST 06:55 (UTC 21:55) — 1차 실패 대비 재시도
    - cron: '55 21 * * *'
    # KST 12:10 (UTC 03:10) — 오후 업데이트
    - cron: '10 3 * * *'
    # KST 12:25 (UTC 03:25) — 오후 재시도
    - cron: '25 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect news & generate site
        run: python auto_competitors.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 대형사_동향.csv
          git diff --staged --quiet || git commit -m "Daily update $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push
